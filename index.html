<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダイエット診断アプリ (LINE連携版)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section id="screen-intro" class="screen"></section>
      <section id="screen-question" class="screen hidden"></section>
      <section id="screen-loading" class="screen hidden"></section>
      <section id="screen-result" class="screen hidden"></section>
    </main>

    <aside id="toast" class="toast hidden" aria-live="polite">
      <div class="toast-title">🎁 アドバイス希望を登録しました！</div>
      <div class="toast-body">カウンセラーからのアドバイスをお待ちください。</div>
    </aside>

    <script src="app.js" defer></script>
  </body>
</html>
